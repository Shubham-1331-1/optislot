services:
  - type: web
    name: optislot
    env: python
    rootDir: optislot
    buildCommand: "./build.sh"
    startCommand: "gunicorn optislot.wsgi:application"
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: DATABASE_URL
        fromDatabase:
          name: optislot-db
          property: connectionString
      - key: ALLOWED_HOSTS
        value: ".onrender.com"
      - key: PYTHON_VERSION
        value: "3.11.0"

databases:
  - name: optislot-db
    databaseName: optislot
    user: optislot_user
    plan: free
